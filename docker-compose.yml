services:
  kafka:
    image: confluentinc/confluent-local:7.6.1
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka:29093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    hostname: jobmanager
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    volumes:
      - ./data:/app/data

  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    hostname: taskmanager
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - ./data:/app/data

  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: bus-producer
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - LTA_ACCOUNT_KEY=${LTA_ACCOUNT_KEY}
    volumes:
      - .:/app

  flink-submit:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: flink-submitter
    depends_on:
      - jobmanager
      - taskmanager
      - kafka
    command: >
      bash -c "echo 'Waiting for JobManager...';
      sleep 15;
      echo 'Submitting PyFlink Job...';
      flink run -m jobmanager:8081 -d -py /app/flink_processor.py"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - FLINK_OUTPUT_PATH=/app/data/output
      - FLINK_MAPPING_PATH=/app/data/mappings
      - DOCKER_ENV=true
    volumes:
      - .:/app
      - ./data:/app/data

volumes:
  kafka_data:
